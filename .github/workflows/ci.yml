name: CI — Quality Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancela runs anteriores do mesmo PR para economizar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ══════════════════════════════════════════════════════════════
  # ETAPA 1 — Checagem estática (BLOQUEANTE)
  # ══════════════════════════════════════════════════════════════
  lint:
    name: ESLint + Prettier + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: TypeScript
        run: npm run typecheck

  checklist:
    name: Checklist IA
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Verificar padrões obrigatórios
        run: npm run checklist

  # ══════════════════════════════════════════════════════════════
  # ETAPA 2 — Testes unitários (BLOQUEANTE)
  # ══════════════════════════════════════════════════════════════
  unit-tests:
    name: Vitest + Cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Testes unitários com cobertura
        run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ══════════════════════════════════════════════════════════════
  # ETAPA 3 — Segurança (BLOQUEANTE)
  # ══════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Dependências vulneráveis (high+critical)
        run: npm audit --audit-level=high
      - name: Scan de secrets no código-fonte
        run: npm run secret-scan

  rls-validation:
    name: RLS Validation
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Validar políticas RLS
        run: npm run validate:rls

  # ══════════════════════════════════════════════════════════════
  # ETAPA 4 — Build (BLOQUEANTE)
  # ══════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, checklist, unit-tests, security, rls-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build de produção
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Scan de secrets no bundle
        run: npm run secret-scan:bundle
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ══════════════════════════════════════════════════════════════
  # GATE FINAL — só verde se todos os jobs bloqueantes passaram
  # ══════════════════════════════════════════════════════════════
  gate:
    name: Pipeline OK
    runs-on: ubuntu-latest
    needs: [lint, checklist, unit-tests, security, rls-validation, build]
    if: always()
    steps:
      - name: Verificar status dos jobs bloqueantes
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.checklist.result }}" != "success" ||
                "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ||
                "${{ needs.rls-validation.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ]]; then
            echo "Um ou mais jobs bloqueantes falharam."
            exit 1
          fi
          echo "Todos os checks bloqueantes passaram."
