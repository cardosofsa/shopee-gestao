name: E2E + Visual + Lighthouse (informativos)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Build compartilhado ────────────────────────────────────────────────────
  build:
    name: Build para testes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: e2e-dist
          path: dist/
          retention-days: 1

  # ── Playwright E2E — smoke (informativo) ──────────────────────────────────
  e2e-smoke:
    name: Playwright E2E (informativo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: e2e-dist
          path: dist/
      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps chromium
      - name: E2E smoke tests
        run: npx playwright test e2e/smoke.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # ── Regressão visual — Playwright screenshots (informativo) ───────────────
  visual-regression:
    name: Visual Regression (informativo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: e2e-dist
          path: dist/
      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps chromium
      - name: Testes de regressão visual
        run: npm run test:visual
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff
          path: e2e/**/*-diff.png
          retention-days: 14

  # ── Lighthouse (informativo) ───────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI (informativo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: e2e-dist
          path: dist/
      - name: Iniciar servidor de preview
        run: npm run preview &
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Aguardar servidor
        run: npx wait-on http://localhost:4173 --timeout 30000
      - name: Lighthouse CI
        run: npx @lhci/cli@latest autorun
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
